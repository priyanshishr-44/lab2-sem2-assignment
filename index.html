<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #e83c61, #e71748);
            color: white;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        #search-main-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        #search-main-container>div {
            background: #f4f7fb;
            color: black;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
        }

        input {
            width: 70%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background-color: #e12c65;
            color: white;
            cursor: pointer;
            margin: 5px 5px 0 0;
        }

        button:hover {
            opacity: 0.9;
        }

        #weather-info-main {
            background: #f4f7fb;
            color: black;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        #fetched-data-container div {
            margin: 5px 0;
        }

        #console-container {
            background: #f4f7fb;
            color: black;
            padding: 20px;
            border-radius: 10px;
        }

        #console-bar {
            background: #e6304e;
            height: 20px;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>Async Weather Tracker</h1>

    <div id="search-main-container">
        <div id="first-search-container">
            <h3>Search City</h3>
            <form>
                <input type="text" id="search-city" placeholder="Delhi, London">
                <button type="submit">Search</button>
            </form>
        </div>

        <div id="second-search-container">
            <h3>Search History</h3>
            <div id="search-history"></div>
        </div>
    </div>

    <div id="weather-info-main">
        <h3>Weather Info</h3>
        <div id="fetched-data-container"></div>
    </div>

    <div id="console-container">
        <h3>Console- Event Loop</h3>
        <div id="console-bar"></div>
    </div>

    <script>
        const API_KEY = "db16755af3db0c2684c02c20836b7442";  

        let form = document.querySelector("form")
        let cityInput = document.querySelector("#search-city")
        let weather = document.querySelector("#fetched-data-container")
        let historyContainer = document.querySelector("#search-history")

        // Safe JSON parsing
        let cities;
        try {
            cities = JSON.parse(localStorage.getItem("cities")) || []
            if (!Array.isArray(cities)) {
                cities = []
            }
        } catch {
            cities = []
        }

        function renderHistory() {
            historyContainer.innerHTML = ""
            cities.forEach(cityName => {
                let btn = document.createElement("button")
                btn.textContent = cityName
                btn.addEventListener("click", () => {
                    getWeatherInfo(cityName)
                })
                historyContainer.appendChild(btn)
            })
        }

        async function getWeatherInfo(cityName) {
            try {
                let response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=${API_KEY}&units=metric`
                )

                let data = await response.json()

                if (!response.ok) {
                    throw new Error(data.message)
                }

                let card = document.createElement('div')
                card.innerHTML = `
                    <div><strong>City :</strong> ${data.name}, ${data.sys.country}</div>
                    <div><strong>Temp :</strong> ${data.main.temp} °C</div>
                    <div><strong>Weather :</strong> ${data.weather[0].main}</div>
                    <div><strong>Humidity :</strong> ${data.main.humidity}</div>
                    <div><strong>Wind :</strong> ${data.wind.speed}</div>
                `

                weather.innerHTML = ""
                weather.append(card)

                if (!cities.includes(cityName)) {
                    cities.push(cityName)
                    localStorage.setItem("cities", JSON.stringify(cities))
                    renderHistory()
                }

            } catch (error) {
                weather.innerHTML = `<div style="color:red;">Error: ${error.message}</div>`
            }
        }

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            let cityName = cityInput.value.trim()
            if (cityName !== "") {
                getWeatherInfo(cityName)
                cityInput.value = ""
            }
        })

        renderHistory()
    </script>

</body>

</html>
